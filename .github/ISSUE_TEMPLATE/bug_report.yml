name: Bug report
description: Report a problem with plugin behavior or Jenkins integration
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem.
        Please include enough detail to reproduce the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong, and where did you observe it?
      placeholder: A short description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include job type, Pipeline snippet, Freestyle setup, or system configuration steps when relevant
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: plugin_version
    attributes:
      label: Plugin version
      placeholder: e.g. 0.1 or 999999-SNAPSHOT
  - type: input
    id: jenkins_version
    attributes:
      label: Jenkins version
      placeholder: e.g. 2.528.3
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      render: shell
